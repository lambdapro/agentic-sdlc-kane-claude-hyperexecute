version: 0.1
runson: linux
autosplit: true
concurrency: 4

env:
  TARGET_URL: https://www.americanexpress.com/
  USE_REMOTE_GRID: "false"

runtime:
  language: python
  version: "3.11"

cacheKey: "{{ checksum \"requirements.txt\" }}"
cacheDirectories:
  - .pip_cache

pre:
  - pip install --cache-dir .pip_cache -r requirements.txt
  - pip install pytest-html selenium

testDiscovery:
  type: raw
  mode: dynamic
  command: |
    python3 - <<'PY'
    from pathlib import Path
    selection = Path("reports/pytest_selection.txt")
    tests = []
    if selection.exists():
      tests = [line.strip() for line in selection.read_text().splitlines() if line.strip()]
    if not tests:
      tests = [
        "tests/selenium/test_credit_cards.py::test_sc_001_navigate_to_credit_cards_and_view_list",
        "tests/selenium/test_credit_cards.py::test_sc_002_filter_cards_by_category",
        "tests/selenium/test_credit_cards.py::test_sc_003_click_card_view_details",
        "tests/selenium/test_credit_cards.py::test_sc_004_card_highlights_visible_without_login",
        "tests/selenium/test_credit_cards.py::test_sc_005_relevant_results_for_selected_filter",
      ]
    for t in tests:
      print(t)
    PY

testRunnerCommand: python3 ci/run_pytest_node.py "$test"

mergeArtifacts: true
uploadArtefacts:
  - name: selenium-test-reports
    path:
      - reports/
  - name: hyperexecute-runtime
    path:
      - hyperexecute-cli.log

retryOnFailure: true
maxRetries: 2

report: true
partialReports:
  - frameworkName: extent
    type: html
    location: reports/html

post:
  - echo "Tests complete"

globalTimeout: 60
testSuiteTimeout: 45

jobLabel:
  - amex-credit-cards
  - agentic-sdlc
  - selenium-python

captureScreenRecordingForScenarios: true
