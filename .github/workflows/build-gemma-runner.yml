name: Build Gemma Runner Image

on:
  workflow_dispatch:
  push:
    paths:
      - "docker/Dockerfile.gemma-runner"
      - "docker/entrypoint.sh"
      - ".github/workflows/build-gemma-runner.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/stlc-gemma-runner

jobs:
  build:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=llama3.2-3b-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.gemma-runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between builds so re-builds skip unchanged layers
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Image digest
        run: echo "Pushed ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest — ${{ steps.meta.outputs.labels }}"

  smoke-test:
    name: Smoke Test — LiteLLM health + inference
    needs: build
    runs-on: ubuntu-latest
    services:
      runner:
        image: ghcr.io/${{ github.repository_owner }}/stlc-gemma-runner:latest
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        ports:
          - 4000:4000
        options: >-
          --health-cmd "curl -sf http://localhost:4000/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 60s

    steps:
      - name: Health check
        run: curl -sf http://localhost:4000/health | jq .

      - name: Inference check (tool-use capable)
        run: |
          curl -sf http://localhost:4000/v1/messages \
            -H "Content-Type: application/json" \
            -H "x-api-key: sk-local" \
            -H "anthropic-version: 2023-06-01" \
            -d '{
              "model": "claude-3-haiku-20240307",
              "max_tokens": 32,
              "messages": [{"role": "user", "content": "Reply with just: OK"}]
            }' | jq .
